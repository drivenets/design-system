networks:
  proxy:
    external: true
    name: traefik_proxy

services:
  ds-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds-mcp-server
    ports:
      - '${PORT:-9200}:9200'
    networks:
      - proxy
    environment:
      - PORT=9200
      - MANIFESTS_URL=https://drivenets.github.io/design-system
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9200/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

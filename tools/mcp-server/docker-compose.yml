networks:
  proxy:
    external: true
    name: traefik_proxy

services:
  ds-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds-mcp-server
    ports:
      - '${DS_MCP_PORT:-6006}:6006'
    networks:
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:6006/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

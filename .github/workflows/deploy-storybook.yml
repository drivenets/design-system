name: Storybook

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: false # Ensure that previous runs aren't cancelled and leave the deployment in a broken state.

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    if: github.repository_owner == 'drivenets'

    permissions:
      contents: write

    steps:
      - name: Checkout source code # zizmor: ignore[artipacked] Need persisted token to commit the build.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/actions/install

      - name: Cache turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-storybook-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-storybook-

      - name: Build Storybook
        run: |
          pnpm build:storybook
          cp -r ./packages/design-system/storybook-static /tmp/storybook-static

          LAST_COMMIT=$(git rev-parse --short HEAD)

          echo "LAST_COMMIT=$LAST_COMMIT" >> "$GITHUB_ENV"

      - name: Setup Git User
        uses: ./.github/actions/setup-git-user

      - name: Deploy
        run: |
          git checkout gh-pages
          rm -rf ./*
          cp -r /tmp/storybook-static/* ./

          git add .
          git commit -m "build: deploy storybook ($LAST_COMMIT)"
          git push

      # The `gh-pages` branch doesn't have the `.github/actions/install` directory, so we need to switch
      # back to the previous branch so the automatic "Post Install Dependencies" cleanup step will work.
      - name: Reset Branch
        run: git checkout -

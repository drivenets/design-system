name: Changeset

on:
  pull_request:
    types:
      - opened
      - reopened
      - labeled
      - unlabeled
      - edited
      - synchronize
    branches:
      - main
      - next

permissions: {}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  require-changeset:
    name: Require Changeset
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # Skip opted out PRs, and release PRs
    if: |
      ! contains(github.event.pull_request.labels.*.name, 'skip changelog') &&
      ! (github.event.pull_request.title == 'chore(release): publish' && github.event.pull_request.user.login == 'github-actions[bot]') &&
      ! (github.event.pull_request.user.login == 'dependabot[bot]')

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Dependencies
        uses: ./.github/actions/install

      # Returns exit code 1 when there are changes without changesets attached to them.
      # See: https://github.com/changesets/changesets/blob/main/docs/automating-changesets.md#blocking
      - name: Run Changesets
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: pnpm changeset status --since "origin/$BASE_REF"

  disallow-major-version:
    name: Disallow Major Version
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # Block major versions only on main, allow on next.
    # Skip release & dependabot PRs.
    if: |
      github.event.pull_request.base.ref == 'main' &&
      ! (github.event.pull_request.title == 'chore(release): publish' && github.event.pull_request.user.login == 'github-actions[bot]') &&
      ! (github.event.pull_request.user.login == 'dependabot[bot]')

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Dependencies
        uses: ./.github/actions/install

      - name: Check for Major Changeset
        id: check-major
        uses: ./.github/actions/check-major-version

      - name: Disallow Major Version
        if: steps.check-major.outputs.has-major == 'true'
        run: |
          echo "Error: Major changesets are not allowed. Did you mean to create a minor or patch changeset instead?"
          exit 1

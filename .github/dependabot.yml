version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      cronjob: 'every other sunday at 07:00'
      timezone: 'Asia/Jerusalem'
    commit-message:
      prefix: 'chore'

    # Should match pnpm's `minimumReleaseAge`
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown] We're fine with 1 day.

    groups:
      # Matching the pnpm catalog entries manually since Dependabot matches them under the production group.
      # See: https://github.com/dependabot/dependabot-core/issues/14824
      pnpm-catalog:
        patterns:
          - '@arethetypeswrong/cli'
          - '@typescript/native-preview'
          - '@vitest/coverage-v8'
          - 'publint'
          - 'tsdown'
          - 'typescript'
          - 'vitest'

      # All eslint-related packages are better to be updated together.
      eslint:
        patterns:
          - '*eslint*'
          - 'globals'

      npm-development:
        dependency-type: 'development'
        patterns:
          - '**'

      npm-production:
        dependency-type: 'production'
        patterns:
          - '**'

  - package-ecosystem: 'github-actions'
    directories:
      - '/'
      - '/.github/actions/*'

    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown] We're fine with 1 day.

    schedule:
      interval: 'cron'
      cronjob: 'every other sunday at 07:00'
      timezone: 'Asia/Jerusalem'
    commit-message:
      prefix: 'ci'
    groups:
      github-actions:
        group-by: dependency-name
